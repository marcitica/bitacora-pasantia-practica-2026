<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Mi bitácora</title>

  <link
    rel="stylesheet"
    href="css/estilos.css"
  >
</head>

<body>

  <header class="encabezado">

    <div>
      <h1>Mi bitácora</h1>

      <p>Registro diario de actividades</p>
    </div>

    <button
      type="button"
      class="boton-secundario"
      onclick="cerrarSesion()"
    >
      Cerrar sesión
    </button>

  </header>

  <nav class="menu">

    <a href="estudiante.html">
      Mi información
    </a>

    <a href="bitacora.html">
      Mi bitácora
    </a>

  </nav>

  <main class="contenedor">

    <section class="panel">

      <h2>Registrar actividad</h2>

      <form
        id="formBitacora"
        class="formulario-grid"
      >

        <input
          type="hidden"
          id="registroId"
        >

        <div>
          <label for="fecha">
            Fecha
          </label>

          <input
            type="date"
            id="fecha"
            required
          >
        </div>

        <div>
          <label for="horaEntrada">
            Hora de entrada
          </label>

          <input
            type="time"
            id="horaEntrada"
            required
          >
        </div>

        <div>
          <label for="horaSalida">
            Hora de salida
          </label>

          <input
            type="time"
            id="horaSalida"
            required
          >
        </div>

        <div class="campo-completo">
          <label for="tarea">
            Actividad realizada
          </label>

          <textarea
            id="tarea"
            rows="5"
            required
          ></textarea>
        </div>

        <div class="campo-completo">
          <label for="firmaSupervisor">
            Firma o nombre del supervisor
          </label>

          <input
            type="text"
            id="firmaSupervisor"
          >
        </div>

        <div class="campo-completo">
          <button type="submit">
            Guardar actividad
          </button>

          <button
            type="button"
            class="boton-secundario"
            onclick="limpiarFormulario()"
          >
            Cancelar edición
          </button>
        </div>

      </form>

    </section>

    <section class="panel">

  <h2>Registros realizados</h2>

  <p>
    Total de horas:
    <strong id="totalHoras">0</strong>
  </p>

  <div class="acciones-bitacora">

    <div>
      <label for="semanaImprimir">
        Seleccionar semana
      </label>

      <input
        type="week"
        id="semanaImprimir"
      >
    </div>

    <button
      type="button"
      class="boton-secundario"
      id="btnImprimirSemana"
    >
      Imprimir semana
    </button>

  </div>

  <div class="tabla-responsive">

    <table>

      <thead>
        <tr>
          <th>Fecha</th>
          <th>Actividad</th>
          <th>Entrada</th>
          <th>Salida</th>
          <th>Horas</th>
          <th>Estado</th>
          <th>Observaciones</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody id="tablaBitacoras"></tbody>

    </table>

  </div>

</section>
<section
  id="reporteSemana"
  class="reporte-impresion"
></section>

  </main>

  <script src="js/api.js"></script>

  <script src="js/bitacora.js"></script>

</body>
</html>
