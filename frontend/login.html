<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Bitácora de Pasantía 2026</title>

  <link
    rel="stylesheet"
    href="css/estilos.css"
  >
</head>

<body class="pagina-login">

  <main class="tarjeta-login">

    <h1>Bitácora de Pasantía 2026</h1>

    <p class="subtitulo-login">
      Colegio Técnico Profesional Cañas
    </p>

    <form
      id="formLogin"
      novalidate
    >

      <div class="grupo-campo">
        <label for="correo">
          Correo electrónico
        </label>

        <input
          type="email"
          id="correo"
          name="correo"
          placeholder="ejemplo@correo.com"
          autocomplete="email"
          required
        >
      </div>

      <div class="grupo-campo">
        <label for="password">
          Contraseña
        </label>

        <input
          type="password"
          id="password"
          name="password"
          placeholder="Ingrese su contraseña"
          autocomplete="current-password"
          required
        >
      </div>

      <button type="submit" id="btnLogin">Iniciar sesión</button>
        
      <p
        id="mensajeLogin"
        class="mensaje-error"
        role="alert"
        aria-live="polite"
      ></p>

    </form>

  </main>

  <script src="js/api.js"></script>
  <script src="js/login.js"></script>

</body>
</html>
